<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>養成記帳好習慣</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    html, body { 
      background-color: #FCE4EC; 
      margin: 0;
      padding: 0;
      overflow-x: hidden; 
      overflow-y: auto; 
      height: 100%;
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    input[type="date"]::-webkit-inner-spin-button,
    input[type="date"]::-webkit-calendar-picker-indicator { display: block; opacity: 1; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    input, button { -webkit-appearance: none; outline: none !important; border-radius: 1rem; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #F8BBD0; border-radius: 10px; }
    .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const icons = {
        Calendar: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ),
        User: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> ),
        Tag: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> ),
        DollarSign: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> ),
        PenTool: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg> ),
        CreditCard: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg> ),
        CheckCircle2: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ),
        Loader: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg> )
      };
      return icons[name] || null;
    };

    const App = () => {
      const [authStatus, setAuthStatus] = React.useState('loading'); 
      const [apiToken, setApiToken] = React.useState("");
      const [status, setStatus] = React.useState('idle');
      
      const apiUrl = 'https://script.google.com/macros/s/AKfycbw-Ksdto1jKVF2m6sQnOt94TjQxGeJDJT-IYodm5KuAGXWxasgR-E51VGC_v4uAFJnF/exec';

      const getTodayString = () => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; };
      const [fullDate, setFullDate] = React.useState(getTodayString());
      const [formData, setFormData] = React.useState({ user: '', category: '', amount: '', content: '', payment: '' });
      const successRef = React.useRef(null);

      const categories = ["食物", "日用", "交通", "車車", "衣物", "寵物", "電器", "運動", "教育", "娛樂", "醫療", "禮物", "其他"];
      const payments = ["現金", "現金-自", "信用卡", "信用卡-自"];

      React.useEffect(() => {
        let rawId = new URLSearchParams(window.location.search).get('id');
        if (!rawId) {
          setAuthStatus('denied');
          return;
        }

        // 清理 ID (去除空格與可能的引號)
        const id = rawId.replace(/["']/g, "").trim();

        let isMounted = true;
        let timeoutId;

        // 全域回傳函數
        window.onVerifyResult = (res) => {
          if (!isMounted) return;
          if (timeoutId) clearTimeout(timeoutId);
          
          if (res && res.auth === 'OK') {
            setApiToken(id);
            setTimeout(() => { if (isMounted) setAuthStatus('authorized'); }, 100);
          } else {
            if (isMounted) setAuthStatus('denied');
          }
          
          const s = document.getElementById('v-script');
          if (s) s.remove();
        };

        // 延長超時至 5 秒
        timeoutId = setTimeout(() => {
          if (isMounted && authStatus === 'loading') {
            setAuthStatus('denied');
          }
        }, 5000);

        const script = document.createElement('script');
        script.id = 'v-script';
        script.src = `${apiUrl}?action=verify&id=${encodeURIComponent(id)}&callback=onVerifyResult&_t=${Date.now()}`;
        script.onerror = () => {
          if (isMounted) {
            setAuthStatus('denied');
            if (timeoutId) clearTimeout(timeoutId);
          }
        };
        document.body.appendChild(script);

        return () => {
          isMounted = false;
          if (timeoutId) clearTimeout(timeoutId);
          // 不在 cleanup 直接刪除 window 函數，交由 callback 自行處理，避免 React 重複掛載導致失效
        };
      }, []);

      React.useEffect(() => {
        if (status === 'success' && successRef.current) {
          successRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [status]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.user || !formData.category || !formData.amount) return;
        setStatus('loading');
        const dateParts = fullDate.split('-'); 
        const payload = {
          timestamp: new Intl.DateTimeFormat('zh-TW', { year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(new Date()),
          yearMonth: `${dateParts[0]}/${dateParts[1]}`, 
          day: dateParts[2], 
          category: formData.category,
          content: formData.content,
          amount: formData.amount,
          payment: formData.payment,
          user: formData.user,
          api_token: apiToken
        };

        try {
          await fetch(apiUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload), keepalive: true });
          setStatus('success');
          setFormData({ user: '', category: '', amount: '', content: '', payment: '' });
          setFullDate(getTodayString());
        } catch (error) { setStatus('error'); }
      };

      const updateField = (name, value) => setFormData(prev => ({ ...prev, [name]: value }));

      if (authStatus === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#FCE4EC] text-pink-600 font-black px-10 text-center">
            <div className="space-y-6">
              <Icon name="Loader" className="w-16 h-16 mx-auto text-pink-500" />
              <div className="space-y-2">
                <p className="tracking-[0.2em] uppercase italic text-xl">正在安全驗證中...</p>
                <p className="text-xs text-pink-400 font-medium tracking-widest">正在連線至 Google 伺服器</p>
              </div>
            </div>
          </div>
        );
      }

      if (authStatus === 'denied') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-400 font-black p-10">
            <div className="text-center space-y-8 max-w-sm">
              <div className="text-8xl">🚧</div>
              <div>
                <p className="tracking-[0.3em] uppercase italic text-sm mb-2 text-slate-500 font-black">System Under Maintenance</p>
                <p className="mt-4 text-[10px] text-slate-300">請確認網址末端 ID 是否正確</p>
              </div>
            </div>
          </div>
        );
      }

      if (status === 'success') {
        return (
          <div className="flex items-start justify-center min-h-[600px] h-[80vh] max-w-[600px] mx-auto p-4 transition-all">
            <div ref={successRef} className="bg-white rounded-[3rem] p-12 text-center shadow-2xl w-full max-w-md animate-in slide-in-from-bottom duration-500 border-t-8 border-green-500">
              <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <Icon name="CheckCircle2" className="w-12 h-12 text-green-600" />
              </div>
              <h2 className="text-3xl font-black text-gray-800">記錄成功！</h2>
              <p className="text-gray-400 mt-4 text-sm text-balance leading-relaxed">養成記帳好習慣，妳最棒了！<br/>資料已安全存入試算表。</p>
              <button onClick={() => setStatus('idle')} className="mt-10 w-full py-5 bg-pink-500 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">繼續記下一筆 ✨</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen py-6 px-2 text-gray-800 pb-32">
          <div className="max-w-md mx-auto space-y-4 font-black">
            <div className="bg-white rounded-[2.5rem] shadow-sm border-t-8 border-pink-500 p-8 relative overflow-hidden text-center animate-[float_5s_ease-in-out_infinite]">
              <h1 className="text-3xl font-black text-gray-800 tracking-tight italic">養成記帳好習慣!!</h1>
              <p className="text-gray-500 mt-1 text-sm font-bold tracking-widest uppercase">Today's Expense Tracker</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4 font-black">
              <section className="bg-white rounded-[2rem] p-6 shadow-sm border-2 border-transparent focus-within:border-pink-200 transition-all font-black">
                <label className="block font-black mb-3 flex items-center text-gray-700 text-sm italic">
                  <Icon name="Calendar" className="w-4 h-4 mr-2 text-pink-500" /> 交易日期 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input required type="date" value={fullDate} onChange={(e) => setFullDate(e.target.value)} className="w-full p-4 bg-pink-50/30 rounded-2xl border border-pink-50 text-pink-700 font-black outline-none text-xl appearance-none font-black" />
              </section>

              <section className="bg-white rounded-[2rem] p-6 shadow-sm font-black font-black">
                <label className="block font-black mb-4 flex items-center text-gray-700 text-sm italic">
                  <Icon name="User" className="w-4 h-4 mr-2 text-pink-500" /> 是誰花的？ <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3 font-black">
                  {["庭", "珊"].map(u => (
                    <button key={u} type="button" onClick={() => updateField('user', u)} className={`p-4 rounded-2xl border-2 transition-all font-black text-xl active:scale-95 ${formData.user === u ? 'border-pink-500 bg-pink-50 text-pink-600 shadow-md scale-105' : 'border-gray-50 bg-gray-50 text-gray-400'}`}>{u}</button>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-[2rem] p-6 shadow-sm font-black">
                <label className="block font-black mb-4 flex items-center text-gray-700 text-sm italic">
                  <Icon name="Tag" className="w-4 h-4 mr-2 text-pink-500" /> 項目 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-3 gap-2 font-black">
                  {categories.map(c => (
                    <label key={c} className={`flex flex-col items-center justify-center p-4 rounded-2xl border transition-all cursor-pointer text-center space-y-1 active:scale-90 ${formData.category === c ? 'bg-pink-100 border-pink-400 shadow-md scale-105' : 'bg-gray-50 border-gray-50'}`}>
                      <input required type="radio" name="category" checked={formData.category === c} onChange={() => updateField('category', c)} className="hidden font-black" />
                      <span className={`text-lg font-black ${formData.category === c ? 'text-pink-700' : 'text-gray-500'}`}>{c}</span>
                    </label>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-[2rem] p-6 shadow-sm font-black">
                <label className="block font-black mb-2 flex items-center text-gray-700 text-sm italic font-black">
                  <Icon name="DollarSign" className="w-4 h-4 mr-2 text-pink-500" /> 金額 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input required type="number" inputMode="decimal" placeholder="0" value={formData.amount} onChange={(e) => updateField('amount', e.target.value)} onWheel={(e) => e.target.blur()} className="w-full border-b-4 border-pink-50 py-4 focus:border-pink-500 outline-none text-5xl font-mono font-black text-pink-600 bg-transparent placeholder:text-pink-100 font-black" />
              </section>

              <section className="bg-white rounded-[2rem] p-6 shadow-sm font-black">
                <label className="block font-black mb-2 flex items-center text-gray-700 text-sm italic font-black">
                  <Icon name="PenTool" className="w-4 h-4 mr-2 text-pink-500" /> 內容 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input required type="text" placeholder="備註..." value={formData.content} onChange={(e) => updateField('content', e.target.value)} className="w-full border-b-2 border-gray-100 py-3 focus:border-pink-500 outline-none text-xl font-black text-pink-700 placeholder:text-pink-100 font-black" />
              </section>

              <section className="bg-white rounded-[2rem] p-6 shadow-sm font-black">
                <label className="block font-black mb-4 flex items-center text-gray-700 text-sm italic font-black">
                  <Icon name="CreditCard" className="w-4 h-4 mr-2 text-pink-500" /> 付款方式 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3 font-black">
                  {payments.map(p => (
                    <label key={p} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all cursor-pointer text-center active:scale-90 ${formData.payment === p ? 'bg-pink-100 border-pink-500 shadow-md scale-105' : 'border-gray-50 bg-gray-50 text-gray-400'}`}>
                      <input required type="radio" name="payment" checked={formData.payment === p} onChange={() => updateField('payment', p)} className="hidden font-black" />
                      <span className={`text-lg font-black ${formData.payment === p ? 'text-pink-700' : 'text-gray-500'}`}>{p}</span>
                    </label>
                  ))}
                </div>
              </section>

              <div className="pt-6 font-black">
                <button type="submit" disabled={status === 'loading'} className={`w-full py-6 rounded-[2rem] font-black text-white shadow-2xl flex items-center justify-center space-x-4 transition-all active:scale-95 font-black ${status === 'loading' ? 'bg-pink-200 text-pink-400' : 'bg-gradient-to-r from-pink-500 to-rose-600 shadow-pink-200'}`}>
                  {status === 'loading' ? <Icon name="Loader" className="w-8 h-8 font-black" /> : <Icon name="CheckCircle2" className="w-8 h-8 font-black" />}
                  <span className="text-2xl tracking-[0.2em] uppercase italic font-black">{status === 'loading' ? '傳送中...' : '送出記錄'}</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
