<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>養成記帳好習慣</title>
  <!-- 載入核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 用於解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 核心修正：允許垂直滑動，但隱藏水平滑動，確保不會卡住 */
    html, body { 
      background-color: #FCE4EC; 
      margin: 0;
      padding: 0;
      overflow-x: hidden; 
      overflow-y: auto; 
      height: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    input[type="date"]::-webkit-inner-spin-button,
    input[type="date"]::-webkit-calendar-picker-indicator { display: block; opacity: 1; }
    
    /* 移除數字輸入框的箭頭 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    /* 移除 iOS 輸入框預設陰影 */
    input, button { -webkit-appearance: none; border-radius: 1rem; }

    /* 優化捲動條外觀 (僅 Webkit 瀏覽器) */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #F8BBD0; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const icons = {
        Calendar: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        ),
        User: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
          </svg>
        ),
        Tag: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line>
          </svg>
        ),
        DollarSign: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        ),
        PenTool: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
          </svg>
        ),
        CreditCard: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
        ),
        CheckCircle2: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        ),
        Loader2: (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}>
            <line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
          </svg>
        )
      };
      return icons[name] || null;
    };

    const App = () => {
      const getTodayString = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      };

      const getFormattedTimestamp = () => {
        return new Intl.DateTimeFormat('zh-TW', {
          year: 'numeric', month: 'numeric', day: 'numeric',
          hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true
        }).format(new Date());
      };

      const [fullDate, setFullDate] = React.useState(getTodayString());
      const [formData, setFormData] = React.useState({ user: '', category: '', amount: '', content: '', payment: '' });
      const [status, setStatus] = React.useState('idle');
      
      // 新增 Ref 用於跳轉置中
      const successRef = React.useRef(null);

      const apiUrl = 'https://script.google.com/macros/s/AKfycbydc3tx0aPpod45XBe5l2MNlCETBYXjDXkuFoGBPrplv4CulNoaraIehTT-B_x9axxiVg/exec';

      const categories = ["食物", "日用", "交通", "車車", "衣物", "寵物", "電器", "運動", "教育", "娛樂", "醫療", "禮物", "其他"];
      const payments = ["現金", "現金-自", "信用卡", "信用卡-自"];

      // 偵測成功狀態，自動跳轉到高度中間
      React.useEffect(() => {
        if (status === 'success' && successRef.current) {
          successRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [status]);

      const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
        try {
          return await fetch(url, options);
        } catch (error) {
          if (retries <= 0) throw error;
          await new Promise(resolve => setTimeout(resolve, backoff));
          return fetchWithRetry(url, options, retries - 1, backoff * 2);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('loading');

        const dateParts = fullDate.split('-'); 
        const payload = {
          timestamp: getFormattedTimestamp(),
          yearMonth: `${dateParts[0]}/${dateParts[1]}`, 
          day: dateParts[2], 
          category: formData.category,
          content: formData.content,
          amount: formData.amount,
          payment: formData.payment,
          user: formData.user
        };

        try {
          await fetchWithRetry(apiUrl, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(payload),
            keepalive: true
          });

          setStatus('success');
          setFormData({ user: '', category: '', amount: '', content: '', payment: '' });
          setFullDate(getTodayString());
        } catch (error) {
          console.error('Error:', error);
          setStatus('error');
        }
      };

      const updateField = (name, value) => setFormData(prev => ({ ...prev, [name]: value }));

      if (status === 'success') {
        return (
          /* 成功畫面：垂直置中顯示 */
          <div className="flex items-start justify-center min-h-[600px] h-[80vh] max-w-[600px] mx-auto p-4 transition-all">
            <div 
              ref={successRef}
              className="bg-white rounded-3xl p-10 text-center shadow-xl w-full max-w-md animate-in slide-in-from-bottom duration-500"
            >
              <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <Icon name="CheckCircle2" className="w-12 h-12 text-green-600" />
              </div>
              <h2 className="text-2xl font-bold text-gray-800">記錄成功！</h2>
              <p className="text-gray-400 mt-2 text-sm text-balance text-center">資料已儲存至試算表。</p>
              <button 
                onClick={() => setStatus('idle')} 
                className="mt-8 w-full py-4 bg-pink-500 text-white rounded-2xl font-bold shadow-lg shadow-pink-100 transition-all active:scale-95"
              >
                繼續記下一筆
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen py-6 px-2 text-gray-800 pb-32">
          <div className="max-w-md mx-auto space-y-4">
            <div className="bg-white rounded-2xl shadow-sm border-t-8 border-pink-500 p-6 relative overflow-hidden text-center">
              <h1 className="text-2xl font-bold text-gray-800 tracking-tight">養成記帳好習慣!!</h1>
              <p className="text-gray-500 mt-1 text-sm font-medium">今天花了多少呢？</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <section className="bg-white rounded-2xl p-6 shadow-sm border-2 border-transparent focus-within:border-pink-200 transition-all">
                <label className="block font-bold mb-3 flex items-center text-gray-700 text-sm">
                  <Icon name="Calendar" className="w-4 h-4 mr-2 text-pink-500" /> 交易日期 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input 
                  required 
                  type="date" 
                  value={fullDate} 
                  onChange={(e) => setFullDate(e.target.value)} 
                  className="w-full p-4 bg-pink-50/50 rounded-2xl border border-pink-50 text-pink-700 font-bold outline-none text-lg appearance-none" 
                />
              </section>

              <section className="bg-white rounded-2xl p-6 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="User" className="w-4 h-4 mr-2 text-pink-500" /> 是誰花的？ <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3">
                  {["庭", "珊"].map(u => (
                    <button 
                      key={u} 
                      type="button" 
                      onClick={() => updateField('user', u)} 
                      className={`p-4 rounded-xl border transition-all font-bold text-lg active:scale-90 ${formData.user === u ? 'bg-pink-100 border-pink-400 text-pink-700 shadow-sm scale-95' : 'bg-gray-50 border-gray-50 text-gray-500'}`}
                    >
                      {u}
                    </button>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-2xl p-6 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="Tag" className="w-4 h-4 mr-2 text-pink-500" /> 項目 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-3 gap-2">
                  {categories.map(c => (
                    <label key={c} className={`flex flex-col items-center justify-center p-4 rounded-xl border transition-all cursor-pointer text-center space-y-1 active:scale-90 ${formData.category === c ? 'bg-pink-100 border-pink-400 shadow-sm scale-95' : 'bg-gray-50 border-gray-50'}`}>
                      <input required type="radio" name="category" checked={formData.category === c} onChange={() => updateField('category', c)} className="hidden" />
                      <span className={`text-lg font-bold ${formData.category === c ? 'text-pink-700' : 'text-gray-500'}`}>{c}</span>
                    </label>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-2xl p-6 shadow-sm">
                <label className="block font-bold mb-2 flex items-center text-gray-700 text-sm">
                  <Icon name="DollarSign" className="w-4 h-4 mr-2 text-pink-500" /> 金額 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input 
                  required 
                  type="number" 
                  inputMode="decimal" 
                  placeholder="0" 
                  value={formData.amount} 
                  onChange={(e) => updateField('amount', e.target.value)} 
                  onWheel={(e) => e.target.blur()} 
                  className="w-full border-b-2 border-gray-100 py-3 px-4 focus:border-pink-500 outline-none transition-all text-3xl font-mono font-bold text-pink-600 bg-transparent placeholder:text-pink-100 text-left" 
                />
              </section>

              <section className="bg-white rounded-2xl p-6 shadow-sm">
                <label className="block font-bold mb-2 flex items-center text-gray-700 text-sm">
                  <Icon name="PenTool" className="w-4 h-4 mr-2 text-pink-500" /> 內容 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <input 
                  required 
                  type="text" 
                  placeholder="備註..." 
                  value={formData.content} 
                  onChange={(e) => updateField('content', e.target.value)} 
                  className="w-full border-b-2 border-gray-100 py-3 px-4 focus:border-pink-500 outline-none text-lg text-pink-700 font-bold placeholder:text-pink-100 text-left" 
                />
              </section>

              <section className="bg-white rounded-2xl p-6 shadow-sm">
                <label className="block font-bold mb-4 flex items-center text-gray-700 text-sm">
                  <Icon name="CreditCard" className="w-4 h-4 mr-2 text-pink-500" /> 付款方式 <span className="text-pink-500 ml-1 font-black">*</span>
                </label>
                <div className="grid grid-cols-2 gap-3">
                  {payments.map(p => (
                    <label key={p} className={`flex flex-col items-center justify-center p-4 rounded-xl border transition-all cursor-pointer text-center active:scale-90 ${formData.payment === p ? 'bg-pink-100 border-pink-400 shadow-sm scale-95' : 'bg-gray-50 border-gray-50 text-gray-400'}`}>
                      <input required type="radio" name="payment" checked={formData.payment === p} onChange={() => updateField('payment', p)} className="hidden" />
                      <span className={`text-lg font-bold ${formData.payment === p ? 'text-pink-700' : 'text-gray-500'}`}>{p}</span>
                    </label>
                  ))}
                </div>
              </section>

              <div className="pt-4">
                <button 
                  type="submit" 
                  disabled={status === 'loading'} 
                  className={`w-full py-5 rounded-3xl font-bold text-white shadow-xl flex items-center justify-center space-x-3 transition-all active:scale-95 ${status === 'loading' ? 'bg-pink-200' : 'bg-[#E91E63] shadow-pink-200 hover:bg-[#D81B60]'}`}
                >
                  {status === 'loading' ? <Icon name="Loader2" className="w-6 h-6" /> : <Icon name="CheckCircle2" className="w-6 h-6" />}
                  <span className="text-xl tracking-widest uppercase">
                    {status === 'loading' ? '傳送中...' : '送出記錄'}
                  </span>
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
